name: iOS build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install CocoaPods dependencies
        run: pod install

      - name: Build app
        run: >
          xcodebuild
          -workspace letsApply.xcworkspace
          -scheme letsApply
          -configuration Debug
          -destination "generic/platform=iOS Simulator"
          CODE_SIGNING_ALLOWED=NO
          build
