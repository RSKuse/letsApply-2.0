name: Import partner vacancies

on:
  workflow_dispatch:
  schedule:
    # Daily at 06:15 South African Standard Time.
    - cron: "15 4 * * *"

permissions:
  contents: read

concurrency:
  group: partner-vacancy-import
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install importer
        run: pip install -r tools/requirements.txt

      - name: Test importers
        run: python -m unittest discover -s tools -p "test_*.py"

      - name: Import approved partner feeds
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GREENHOUSE_BOARDS_JSON: ${{ vars.GREENHOUSE_BOARDS_JSON }}
          LEVER_SITES_JSON: ${{ vars.LEVER_SITES_JSON }}
          RELIEFWEB_APPNAME: ${{ vars.RELIEFWEB_APPNAME }}
        run: python tools/import_partner_jobs.py --publish
